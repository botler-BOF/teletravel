name: Deploy Blog to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: docker build -t gcr.io/adp-413110/blog-myteletravel:${{ github.sha }} -t gcr.io/adp-413110/blog-myteletravel:latest .

      - name: Push Docker image
        run: |
          docker push gcr.io/adp-413110/blog-myteletravel:${{ github.sha }}
          docker push gcr.io/adp-413110/blog-myteletravel:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy blog-myteletravel \
            --image gcr.io/adp-413110/blog-myteletravel:${{ github.sha }} \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 256Mi \
            --max-instances 3 \
            --set-env-vars "GCP_SA_KEY_B64=${{ secrets.GCP_SA_KEY_B64 }},GH_PAT=${{ secrets.GH_PAT }}"
